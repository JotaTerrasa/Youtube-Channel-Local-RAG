services:
  chroma:
    image: chromadb/chroma:latest
    container_name: youtube-rag-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/data
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped

  whisper:
    build:
      context: ./docker/whisper
    container_name: youtube-rag-whisper
    ports:
      - "9000:9000"
    gpus: all
    volumes:
      - ./data/whisper-cache:/root/.cache/huggingface
    environment:
      WHISPER_MODEL: large-v3
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: float16
      WHISPER_DOWNLOAD_ROOT: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    restart: unless-stopped
