services:
  chroma:
    image: chromadb/chroma:1.5.9
    container_name: youtube-rag-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/data
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped

  whisper:
    build:
      context: ./docker/whisper
    container_name: youtube-rag-whisper
    ports:
      - "9000:9000"
    volumes:
      - ./data/whisper-cache:/root/.cache/huggingface
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-medium}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_DOWNLOAD_ROOT: /root/.cache/huggingface
    restart: unless-stopped
